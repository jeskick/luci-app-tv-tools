# =============================================================================
# VGEO 通用覆写 — 仅针对当前主线 Mihomo 内核与官方合并语义（Clash Verge / OpenClash）
# =============================================================================
# 能力：prepend-proxy-groups、prepend-rules、include-all-proxies、filter、exclude-filter
# 组名前缀 VGEO-，避免与订阅内默认策略组冲突。
# =============================================================================

prepend-proxy-groups:
  - name: VGEO-MEDIA-Unlock
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆|国内|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|\bDIRECT\b|校园|教育|测速)'
    filter: '(?i)(解锁|流媒体|Stream|Streaming|NF|Netflix|奈飞|迪士尼|Disney|HBO|H\+|Max\b|Hulu|DPlus|TikTok|抖音国际|Bahamut|动画疯|Spotify|Prime|Amazon|Video|TVB|MyTV|解锁专线|媒体|专线|隧道|中继|IEPL|IPLC|BGP|家宽|原生|ZJ|LT|CM|流媒体)'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true

  - name: VGEO-MEDIA-Intl
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆|国内|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|\bDIRECT\b|校园|教育|测速)'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true

  - name: VGEO-MEDIA-tactics
    type: fallback
    proxies:
      - VGEO-MEDIA-Unlock
      - VGEO-MEDIA-Intl
    url: http://www.gstatic.com/generate_204
    interval: 180
    lazy: true

  - name: VGEO-AI-Unlock
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆|国内|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|\bDIRECT\b|校园|教育|测速)'
    filter: '(?i)(AI|GPT|ChatGPT|OpenAI|Claude|Anthropic|Gemini|人工智能|智谱|通义|文心|讯飞|解锁.*AI|AI.*解锁)'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true

  - name: VGEO-AI-Intl
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆|国内|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|\bDIRECT\b|校园|教育|测速)'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true

  - name: VGEO-AI-tactics
    type: fallback
    proxies:
      - VGEO-AI-Unlock
      - VGEO-AI-Intl
    url: http://www.gstatic.com/generate_204
    interval: 180
    lazy: true

  - name: VGEO-YT-BestLatency
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆直连|国内直连|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|\bDIRECT\b|No\s*Proxy|BLOCK|NULL|REJECT)'
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 120
    lazy: true

