# =============================================================================
# VGEO 通用覆写 — 仅针对当前主线 Mihomo 内核与官方合并语义（Clash Verge / OpenClash）
# =============================================================================
# 能力：prepend-proxy-groups、prepend-rules、include-all-proxies、filter、exclude-filter
# 组名前缀 VGEO-，避免与订阅内默认策略组冲突。
# AI 组（VGEO-AI-Unlock / VGEO-AI-Intl）exclude-filter：排除名称上为中国大陆/港/澳/台的节点；
# 同时排除订阅里「Traffic:/Expire:/套餐余量」等状态占位节点（非真实出口，url-test 易误选）。
# 无「AI 解锁」专线时也不应让 AI 走上述出口（OpenAI 地区限制、Claude 风控等）。仅靠节点名匹配，未标注地区时请在面板手动选组。
# =============================================================================

prepend-proxy-groups:
  - name: VGEO-MEDIA-Unlock
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆|国内|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|\bDIRECT\b|校园|教育|测速)'
    filter: '(?i)(解锁|流媒体|Stream|Streaming|NF|Netflix|奈飞|迪士尼|Disney|HBO|H\+|Max\b|Hulu|DPlus|TikTok|抖音国际|Bahamut|动画疯|Spotify|Prime|Amazon|Video|TVB|MyTV|解锁专线|媒体|专线|隧道|中继|IEPL|IPLC|BGP|家宽|原生|ZJ|LT|CM|流媒体)'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true

  - name: VGEO-MEDIA-Intl
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆|国内|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|\bDIRECT\b|校园|教育|测速)'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true

  - name: VGEO-MEDIA-tactics
    type: fallback
    proxies:
      - VGEO-MEDIA-Unlock
      - VGEO-MEDIA-Intl
    url: http://www.gstatic.com/generate_204
    interval: 180
    lazy: true

  - name: VGEO-AI-Unlock
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆|国内|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|中国内地|中国大陆|内地节点|国内节点|大陆节点|境内|China\s*Only|CN\s*Only|中國|CMI|CMCC|中国移动|中国联通|中国电信|Chinanet|香港|Hong\s*Kong|Hongkong|\bHK\b|HKG|🇭🇰|澳门|Macau|Macao|台湾|台灣|Taiwan|\bTW\b|TPE|台北|桃园|台中|高雄|新竹|新北|彰化|台南|花莲|基隆|宜兰|云林|屏东|嘉义|南投|澎湖|金门|连江|马祖|🇹🇼|官网|到期|剩余流量|套餐余量|Traffic:|Expire:|\bDIRECT\b|校园|教育|测速)'
    filter: '(?i)(AI|GPT|ChatGPT|OpenAI|Claude|Anthropic|Gemini|人工智能|智谱|通义|文心|讯飞|解锁.*AI|AI.*解锁)'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true

  - name: VGEO-AI-Intl
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆|国内|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|中国内地|中国大陆|内地节点|国内节点|大陆节点|境内|China\s*Only|CN\s*Only|中國|CMI|CMCC|中国移动|中国联通|中国电信|Chinanet|香港|Hong\s*Kong|Hongkong|\bHK\b|HKG|🇭🇰|澳门|Macau|Macao|台湾|台灣|Taiwan|\bTW\b|TPE|台北|桃园|台中|高雄|新竹|新北|彰化|台南|花莲|基隆|宜兰|云林|屏东|嘉义|南投|澎湖|金门|连江|马祖|🇹🇼|官网|到期|剩余流量|套餐余量|Traffic:|Expire:|\bDIRECT\b|校园|教育|测速)'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true

  - name: VGEO-AI-tactics
    type: fallback
    proxies:
      - VGEO-AI-Unlock
      - VGEO-AI-Intl
    url: http://www.gstatic.com/generate_204
    interval: 180
    lazy: true

  - name: VGEO-YT-BestLatency
    type: url-test
    include-all-proxies: true
    exclude-filter: '(?i)(回国|大陆直连|国内直连|中国直连|China\s*Direct|CN\s*Direct|仅国内|本土直连|\bDIRECT\b|No\s*Proxy|BLOCK|NULL|REJECT)'
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 120
    lazy: true

